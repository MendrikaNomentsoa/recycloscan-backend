spring.application.name=recycloscan

# ========================
# Configuration Serveur
# ========================
server.port=8080

# ========================
# Configuration PostgreSQL
# ========================
spring.datasource.url=jdbc:postgresql://localhost:5432/recycloscan
spring.datasource.username=USERNAME
spring.datasource.password=TON_PASSWORD
spring.datasource.driver-class-name=org.postgresql.Driver

# ========================
# Configuration JPA
# ========================
# update : met à jour le schéma automatiquement sans supprimer les données
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ========================
# Configuration JWT
# ========================
# Clé secrète pour signer les tokens (change-la en prod !)
app.jwt.secret=recycloscan-secret-key-very-long-and-secure-2024
# Durée de validité du token : 24h en millisecondes
app.jwt.expiration=86400000

# ========================
# Configuration Gemini
# ========================
# Ta clé API Google Gemini (on l'obtient sur Google AI Studio)
app.gemini.api-key=METS_TA_CLE_ICI
app.gemini.url=https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent

# ========================
# Taille max upload image
# ========================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
